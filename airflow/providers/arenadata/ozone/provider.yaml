---
package-name: apache-airflow-providers-arenadata-ozone
name: Apache Ozone
description: |
  `Apache Ozone <https://ozone.apache.org/>`__

  Provider package for interacting with Apache Ozone via:

  - Native CLI (``ozone``) for ``ofs://`` / ``o3fs://`` paths
  - S3 Gateway (S3-compatible API) via a boto3-based hook

state: ready
# note that those versions are maintained by release manager - do not update them manually
versions:
  - 1.0.0

dependencies:
  - apache-airflow>=2.10.3
  - apache-airflow-providers-apache-hdfs
  - boto3>=1.35.0

integrations:
  - integration-name: Apache Ozone
    external-doc-url: https://ozone.apache.org/
    tags: [apache]

hooks:
  - integration-name: Apache Ozone
    python-modules:
      - airflow.providers.arenadata.ozone.hooks.ozone
      - airflow.providers.arenadata.ozone.hooks.ozone_s3

operators:
  - integration-name: Apache Ozone
    python-modules:
      - airflow.providers.arenadata.ozone.operators.ozone

sensors:
  - integration-name: Apache Ozone
    python-modules:
      - airflow.providers.arenadata.ozone.sensors.ozone

transfers:
  - source-integration-name: Hadoop Distributed File System (HDFS)
    target-integration-name: Apache Ozone
    python-module: airflow.providers.arenadata.ozone.transfers.hdfs_to_ozone
  - source-integration-name: Apache Ozone
    target-integration-name: Apache Ozone
    python-module: airflow.providers.arenadata.ozone.transfers.ozone_backup
  - source-integration-name: Apache Ozone
    target-integration-name: Amazon Simple Storage Service (S3)
    python-module: airflow.providers.arenadata.ozone.transfers.ozone_to_s3

connection-types:
  - hook-class-name: airflow.providers.arenadata.ozone.hooks.ozone.OzoneCliHook
    connection-type: ozone
  - hook-class-name: airflow.providers.arenadata.ozone.hooks.ozone_s3.OzoneS3Hook
    connection-type: ozone_s3
