---
package-name: apache-airflow-providers-arenadata-hbase
name: Arenadata HBase
description: |
    `Apache HBase <https://hbase.apache.org/>`__ provider by Arenadata

state: ready
source-date-epoch: 1768557443
# note that those versions are maintained by release manager - do not update them manually
versions:
  - 1.0.0

dependencies:
  - apache-airflow>=2.7.0
  - thrift>=0.13.0
  - thrift_sasl>=0.4.3
  - sasl>=0.3.1

integrations:
  - integration-name: HBase
    external-doc-url: https://hbase.apache.org/
    tags: [apache, database]

operators:
  - integration-name: HBase
    python-modules:
      - airflow.providers.arenadata.hbase.operators.hbase

sensors:
  - integration-name: HBase
    python-modules:
      - airflow.providers.arenadata.hbase.sensors.hbase

hooks:
  - integration-name: HBase
    python-modules:
      - airflow.providers.arenadata.hbase.hooks.hbase

connection-types:
  - hook-class-name: airflow.providers.arenadata.hbase.hooks.hbase.HBaseThriftHook
    connection-type: hbase
  - hook-class-name: airflow.providers.arenadata.hbase.hooks.hbase_cli.HBaseCLIHook
    connection-type: hbase

example-dags:
  - airflow.providers.arenadata.hbase.example_dags.example_hbase
  - airflow.providers.arenadata.hbase.example_dags.example_hbase_kerberos
  - airflow.providers.arenadata.hbase.example_dags.example_hbase_batch
  - airflow.providers.arenadata.hbase.example_dags.example_hbase_batch_optimized
  - airflow.providers.arenadata.hbase.example_dags.example_hbase_pool
  - airflow.providers.arenadata.hbase.example_dags.example_hbase_sensors
  - airflow.providers.arenadata.hbase.example_dags.example_hbase_cli_commands
  - airflow.providers.arenadata.hbase.example_dags.example_hbase_backup_producer
  - airflow.providers.arenadata.hbase.example_dags.example_hbase_backup_consumer
  - airflow.providers.arenadata.hbase.example_dags.example_hbase_restore
